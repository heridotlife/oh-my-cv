name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "🚀 Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "fix"
      - "bugfix"
      - "bug"
  - title: "♿ Accessibility"
    labels:
      - "accessibility"
      - "a11y"
  - title: "🧰 Maintenance"
    labels:
      - "chore"
      - "dependencies"
  - title: "📚 Documentation"
    labels:
      - "documentation"
      - "docs"
  # Version resolver (release-drafter v7 replaces the deprecated top-level
  # `version-resolver` block with `type: version-resolver` category entries).
  # The final condition-less entry reproduces the old `default: patch` behavior.
  - type: "version-resolver"
    semver-increment: "major"
    when:
      labels:
        - "major"
        - "breaking"
  - type: "version-resolver"
    semver-increment: "minor"
    when:
      labels:
        - "minor"
        - "feature"
  - type: "version-resolver"
    semver-increment: "patch"
    when:
      labels:
        - "patch"
        - "fix"
        - "bugfix"
  - type: "version-resolver"
    semver-increment: "patch"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"

autolabeler:
  - label: "feature"
    title:
      - "/^feat/i"
  - label: "fix"
    title:
      - "/^fix/i"
  - label: "chore"
    title:
      - "/^chore/i"
  - label: "documentation"
    title:
      - "/^docs/i"
  - label: "accessibility"
    title:
      - "/^a11y/i"
      - "/accessibility/i"
      - "/wcag/i"

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
