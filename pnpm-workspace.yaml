packages:
  - site
  - packages/*
allowBuilds:
  "@parcel/watcher": true
  esbuild: true
  vue-demi: true

overrides:
  vite: "^5.3.3"
  nuxt: "3.12.3"
  "@nuxtjs/i18n": "8.3.1"
  "@nuxt/kit": "3.12.3"
  ws: "^8.21.0"
  # Pin @nuxt/devtools: site declares "latest", whose dist-tag now points to
  # 4.0.0-alpha.7, which drags in h3@2.x-rc and breaks the sitemap prerender.
  # Hold at the last known-good pre-release (matches the pnpm-9 baseline).
  "@nuxt/devtools": "4.0.0-alpha.4"
  # Keep h3 on the 1.x line. Regenerating the lockfile under pnpm 11 let some
  # dev-only devtools grandchildren (@vitejs/devtools, devframe) float up to
  # versions requiring h3@2.x-rc, whose getRequestHost breaks the nitro
  # sitemap prerender. Baseline resolved only h3@1.15.11.
  "h3": "^1.15.11"

peerDependencyRules:
  allowedVersions:
    eslint: "9"
